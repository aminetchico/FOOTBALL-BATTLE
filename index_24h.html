<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Football Battle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
background:transparent;
display:flex;justify-content:center;align-items:center;
height:100vh;color:#fff;
}
#game{
width:1200px;
background:rgba(15,15,15,.9);
border-radius:24px;
padding:24px;
border:3px solid rgba(255,255,255,.15);
}
h1{text-align:center;margin-bottom:20px}
.row{display:flex;align-items:center;justify-content:space-between}
.team{width:38%;text-align:center}
.logo{
width:120px;height:120px;border-radius:50%;
border:4px solid #fff;object-fit:cover;background:#333;
}
.name{font-size:32px;margin:10px 0}
.score{font-size:90px;font-weight:bold}
#mcaScore{color:#00ff6a}
#usmaScore{color:#ff3a3a}
.center{width:24%;text-align:center}
.progress{
height:22px;background:#333;border-radius:30px;overflow:hidden;
margin:20px 0;
}
.bar{
height:100%;width:50%;
background:linear-gradient(90deg,#00ff6a,#28d857);
transition:.4s;
}
.timer{font-size:32px}
.last{
margin-top:20px;text-align:center;
font-size:24px
}
</style>
</head>
<body>

<div id="game">

<h1>⚽ تحدي الجمهور ⚽</h1>

<div class="row">

<div class="team">
<img id="logo1" class="logo" src="https://upload.wikimedia.org/wikipedia/en/7/79/MC_Alger_logo.png">
<div class="name">مولودية الجزائر</div>
<div id="mcaScore" class="score">0</div>
</div>

<div class="center">
<div style="font-size:60px;font-weight:bold">VS</div>
<div class="progress"><div id="bar" class="bar"></div></div>
<div id="timer" class="timer">24:00:00</div>
</div>

<div class="team">
<img id="logo2" class="logo" src="https://upload.wikimedia.org/wikipedia/en/6/61/USM_Alger_logo.png">
<div class="name">اتحاد الجزائر</div>
<div id="usmaScore" class="score">0</div>
</div>

</div>

<div id="lastGift" class="last">
🎁 آخر هدية: لا يوجد
</div>

</div>

<script>
// غيّر روابط الصور هنا
const TEAM1_LOGO="https://upload.wikimedia.org/wikipedia/en/7/79/MC_Alger_logo.png";
const TEAM2_LOGO="https://upload.wikimedia.org/wikipedia/en/6/61/USM_Alger_logo.png";

document.getElementById("logo1").src=TEAM1_LOGO;
document.getElementById("logo2").src=TEAM2_LOGO;

let mca=0,usma=0;

function update(){
mcaScore.textContent=mca;
usmaScore.textContent=usma;
const total=Math.max(1,mca+usma);
bar.style.width=(mca/total*100)+"%";
}

function addPoint(team,name="مشاهد",gift="🎁"){
if(team===1)mca++;
else usma++;
lastGift.textContent=`${gift} ${name}`;
update();
}

// للتجربة من الكونسول:
// addPoint(1,"Ahmed","🌹");
// addPoint(2,"Ali","🎁");

let sec=86400;
setInterval(()=>{
if(sec>0){
sec--;
let m=Math.floor(sec/60);
let s=sec%60;
const h=Math.floor(sec/3600);
let rem=sec%3600;
let m=Math.floor(rem/60);
let s=rem%60;
timer.textContent=`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}
},1000);

update();
</script>

</body>
</html>
